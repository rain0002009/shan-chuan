name = "shan-chuan"
main = "src/index.ts"
compatibility_date = "2026-02-18"

[assets]
directory = "./dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["OwnerRegistryDurableObject"]

[[migrations]]
tag = "v3"
deleted_classes = ["OwnerRegistryDurableObject"]
